name: Build Continuwuity for Raspberry Pi 5

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      # 1. Ask the official Forgejo API for the absolute latest release tag
      - name: Get Latest Upstream Release Tag
        id: get_tag
        run: |
          LATEST_TAG=$(curl -s https://forgejo.ellis.link/api/v1/repos/continuwuation/continuwuity/releases/latest | jq -r .tag_name)
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            echo "Failed to fetch tag from Forgejo. Exiting."
            exit 1
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Upstream latest release is: $LATEST_TAG"

      # 2. Log in to your personal GitHub Container Registry early
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Check if you already built this exact version to save runner minutes
      - name: Check if we already built this version
        id: check_build
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/continuwuity-16k:${{ steps.get_tag.outputs.latest_tag }} > /dev/null 2>&1; then
            echo "Version ${{ steps.get_tag.outputs.latest_tag }} already exists. Skipping the 30-minute build."
            echo "build_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Version ${{ steps.get_tag.outputs.latest_tag }} is new! Starting the heavy compilation."
            echo "build_needed=true" >> $GITHUB_OUTPUT
          fi

      # 4. Clone directly from Forgejo, bypassing the GitHub mirror entirely
      - name: Checkout upstream code from Forgejo
        if: steps.check_build.outputs.build_needed == 'true'
        run: |
          git clone --branch ${{ steps.get_tag.outputs.latest_tag }} --depth 1 https://forgejo.ellis.link/continuwuation/continuwuity.git .

      # 5. Hot-patch the Dockerfile for 16KB Raspberry Pi 5 memory pages
      - name: Hot-patch the Dockerfile
        if: steps.check_build.outputs.build_needed == 'true'
        run: |
          # Fix the C-compiler architecture flag for ARM
          sed -i 's/-march=${TARGET_CPU}/-mcpu=${TARGET_CPU}/g' docker/musl.Dockerfile
          
          # Inject 16KB memory page size support
          sed -i '/set -o allexport/a \    export JEMALLOC_SYS_WITH_LG_PAGE=14' docker/musl.Dockerfile

          # Fix the Alpine linker crash by allowing dynamic bindgen compilation
          sed -i 's/bindgen-static,//g' docker/musl.Dockerfile

          # Fix the hardcoded output path so it grabs the binary from the max-perf folder
          sed -i 's|/release/|/${RUST_PROFILE}/|g' docker/musl.Dockerfile
          
          echo "Dockerfile patched successfully."

      # 6. Setup emulation and build tools for ARM64 compilation
      - name: Set up QEMU (for ARM64 emulation)
        if: steps.check_build.outputs.build_needed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_build.outputs.build_needed == 'true'
        uses: docker/setup-buildx-action@v3

      # 7. Compile and Push to your GitHub Packages
      - name: Build and Push Docker Image
        if: steps.check_build.outputs.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/musl.Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            RUST_PROFILE=release-max-perf
            TARGET_CPU=cortex-a76
          tags: |
            ghcr.io/${{ github.repository_owner }}/continuwuity:latest
            ghcr.io/${{ github.repository_owner }}/continuwuity:${{ steps.get_tag.outputs.latest_tag }}
